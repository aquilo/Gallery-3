<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Patience Rating Demo (Option B – Gating)</title>
<style>
  :root { --bg:#0b1020; --fg:#e8ecf1; --muted:#9aa4b2; --card:#141b2d; --acc:#6aa9ff; --acc2:#ffb86b;}
  html,body { margin:0; font:16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Helvetica Neue", Arial; background:var(--bg); color:var(--fg); }
  .wrap { max-width:1100px; margin:24px auto; padding:0 16px 48px; }
  h1 { font-size:24px; margin:8px 0 16px; }
  .row { display:flex; gap:16px; flex-wrap:wrap; }
  .card { background:var(--card); border-radius:14px; padding:14px; box-shadow:0 6px 30px rgba(0,0,0,.18); }
  .card h2 { margin:0 0 8px; font-size:18px; }
  .grow { flex:1 1 0; min-width:280px; }
  label { display:block; font-size:13px; color:var(--muted); margin:8px 0 4px; }
  input[type="number"], input[type="text"] { width:100%; padding:8px 10px; border-radius:10px; border:1px solid #26324a; background:#0f1424; color:var(--fg); }
  input[type="file"] { color:var(--fg); }
  textarea { width:100%; min-height:120px; padding:10px; border-radius:10px; border:1px solid #26324a; background:#0f1424; color:var(--fg); }
  button { background:var(--acc); color:#061128; border:0; padding:10px 14px; border-radius:12px; font-weight:600; cursor:pointer; }
  button.secondary { background:transparent; color:var(--fg); border:1px solid #33415f; }
  .actions { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  table { width:100%; border-collapse:collapse; margin-top:10px; font-size:13px; }
  th, td { padding:8px 6px; border-bottom:1px solid #26324a; text-align:right; }
  th:first-child, td:first-child { text-align:left; }
  .pill { padding:3px 8px; background:#1e2a45; border-radius:999px; font-size:12px; color:var(--muted); }
  canvas { width:100%; max-height:280px; background:#0f1424; border-radius:12px; }
  .grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:16px; }
  @media (max-width:960px) { .grid { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Patience Rating – Demo (Option B / Gating)</h1>

  <div class="row">
    <div class="card grow">
      <h2>Daten</h2>
      <p class="pill">Erwartete Spalten mind.: <b>datetime</b>, <b>player</b>, <b>equal</b>, <b>more</b>, <b>minimum</b>, <b>mean</b></p>
      <div class="actions" style="margin:10px 0">
        <input id="file" type="file" accept=".csv,.tsv,.txt" />
        <button id="loadSample" class="secondary">Beispiel laden</button>
      </div>
      <label for="raw">CSV/TSV einfügen</label>
      <textarea id="raw" placeholder="Füge hier deine Zeilen ein…"></textarea>
      <div class="actions" style="margin-top:10px">
        <button id="run">Berechnen</button>
        <button id="clear" class="secondary">Leeren</button>
      </div>
    </div>

    <div class="card" style="min-width:300px; max-width:360px">
      <h2>Config</h2>
      <div class="grid">
        <div>
          <label>Gewichte</label>
          <label>w_solved (T)</label><input id="w_solved" type="number" step="0.01" value="0.20">
          <label>w_mean (U)</label><input id="w_mean" type="number" step="0.01" value="0.25">
          <label>w_percentile (V^γ)</label><input id="w_percentile" type="number" step="0.01" value="0.45">
          <label>w_best (W)</label><input id="w_best" type="number" step="0.01" value="0.10">
          <label>gamma (γ)</label><input id="gamma" type="number" step="0.1" value="1.6">
        </div>
        <div>
          <label>Gating</label>
          <label>cap solvable ∧ not solved</label><input id="cap_sns" type="number" step="0.01" value="0.55">
          <label>floor under min</label><input id="floor_um" type="number" step="0.01" value="0.90">
          <label>floor solved</label><input id="floor_solved" type="number" step="0.01" value="0.80">
          <label>clip_low / clip_high</label>
          <div class="row" style="gap:8px">
            <input id="clip_low" type="number" step="0.01" value="0.02">
            <input id="clip_high" type="number" step="0.01" value="0.98">
          </div>
          <label>Rating: scale / mid</label>
          <div class="row" style="gap:8px">
            <input id="rating_scale" type="number" step="1" value="800">
            <input id="rating_mid" type="number" step="1" value="1500">
          </div>
          <label>EWMA α / Start</label>
          <div class="row" style="gap:8px">
            <input id="alpha" type="number" step="0.01" value="0.10">
            <input id="start" type="number" step="1" value="1500">
          </div>
          <label>Rolling N</label><input id="windowN" type="number" step="1" value="20">
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="card grow">
      <h2>Verlauf</h2>
      <div class="grid">
        <div><canvas id="chart1" height="260"></canvas></div>
        <div><canvas id="chart2" height="260"></canvas></div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="card grow">
      <h2>Ergebnis-Tabelle</h2>
      <div id="table"></div>
    </div>
  </div>
</div>

<script>
// ---------------- Core math (Option B / Gating) ----------------
function pow(x, g) { return Math.pow(Math.max(0, Math.min(1, x)), g); }
function log10(x){ return Math.log(x)/Math.LN10; }

function computeIndicators(r) {
  const Solvable = (r.player === 0) || (r.minimum === 0);
  const SolvedGivenSolvable = Solvable ? (r.player === 0 ? 1 : 0) : null;
  const BetterThanMean = r.player <= r.mean ? 1 : 0;
  const Percentile_p = (r.equal + r.more) / 100; // equal+more because lower is better
  const BestResult = r.player <= r.minimum ? 1 : 0;
  return { Solvable, SolvedGivenSolvable, BetterThanMean, Percentile_p, BestResult };
}
function computeCRaw(ind, cfg) {
  const t = ind.SolvedGivenSolvable != null ? ind.SolvedGivenSolvable : 0;
  const pGamma = pow(ind.Percentile_p, cfg.gamma);
  return cfg.w_mean * ind.BetterThanMean
       + cfg.w_solved * t
       + cfg.w_percentile * pGamma
       + cfg.w_best * ind.BestResult;
}
function gateC(x, ind, r, cfg) {
  if (ind.Solvable && r.player > 0) return Math.min(x, cfg.cap_solvable_not_solved);
  if (ind.BestResult === 1)         return Math.max(x, cfg.floor_under_min);
  if (ind.Solvable && r.player === 0) return Math.max(x, cfg.floor_solved);
  return x;
}
function clip(x, cfg) { return Math.min(cfg.clip_high, Math.max(cfg.clip_low, x)); }
function toRating(c, cfg){ return cfg.rating_mid + cfg.rating_scale * log10(c/(1-c)); }

function rollingN(arr, N){
  const out=[]; for (let i=0;i<arr.length;i++){
    const s=Math.max(0,i-(N-1)); const slice=arr.slice(s,i+1);
    out.push(slice.reduce((a,b)=>a+b,0)/slice.length);
  } return out;
}

function computeRatings(rows, cfg){
  const data = rows.slice().sort((a,b)=> (a.datetime < b.datetime ? -1 : a.datetime > b.datetime ? 1 : 0));
  const tmp = data.map(r=>{
    const ind = computeIndicators(r);
    const C_raw = computeCRaw(ind,cfg);
    const C_gated = gateC(C_raw, ind, r, cfg);
    const C_clipped = clip(C_gated, cfg);
    const GameRating = toRating(C_clipped, cfg);
    return {r, ind, C_raw, C_gated, C_clipped, GameRating};
  });
  const out=[]; let ewma=cfg.start_ewma; const gr=[];
for (let i=0; i < tmp.length; i++) {
    const t=tmp[i];
    ewma = (1-cfg.alpha_ewma)*ewma + cfg.alpha_ewma*t.GameRating;
    gr.push(t.GameRating);
    out.push({
      datetime:t.r.datetime, player:t.r.player, equal:t.r.equal, more:t.r.more, minimum:t.r.minimum, mean:t.r.mean,
      Solvable:t.ind.Solvable, SolvedGivenSolvable:t.ind.SolvedGivenSolvable, BetterThanMean:t.ind.BetterThanMean,
      Percentile_p:t.ind.Percentile_p, BestResult:t.ind.BestResult,
      C_raw:t.C_raw, C_gated:t.C_gated, C_clipped:t.C_clipped,
      GameRating:t.GameRating, EWMA_Rating:ewma, RollingN_Rating:0
    });
  }
  const roll = rollingN(gr, cfg.window_N);
  for (let i=0;i<out.length;i++) out[i].RollingN_Rating = roll[i];
  return out;
}
// ---------------- CSV utilities ----------------
function parseDate(str){
  // supports "DD.MM.YYYY_HH:mm:ss" or ISO "YYYY-MM-DDTHH:mm:ss"
  if (/^\d{2}\.\d{2}\.\d{4}_\d{2}:\d{2}:\d{2}$/.test(str)) {
    const [dpart, tpart] = str.split('_');
    const [dd,mm,yyyy] = dpart.split('.').map(Number);
    return `${yyyy.toString().padStart(4,'0')}-${mm.toString().padStart(2,'0')}-${dd.toString().padStart(2,'0')}T${tpart}`;
  }
  return str; // assume already sortable
}
function parseCSV(text){
  // Simple parser for comma or tab separated, first row headers.
  // Assumes no quoted delimiters (fits your export).
  const delim = text.includes('\t') ? '\t' : ',';
  const rows = text.trim().split(/\r?\n/).filter(Boolean).map(line=> line.split(delim));
  if (!rows.length) return [];
  const headers = rows[0].map(h => h.trim().toLowerCase());
  const idx = (name) => headers.indexOf(name);
  const iDatetime = idx('datetime');
  const iPlayer   = idx('player');
  const iEqual    = idx('equal');
  const iMore     = idx('more');
  const iMin      = idx('minimum');
  const iMean     = idx('mean');
  const out=[];
  for (let r=1;r<rows.length;r++){
    const a = rows[r];
    if (!a.length || a.every(v => v.trim()==='')) continue;
    out.push({
      datetime: parseDate(a[iDatetime]?.trim()||''),
      player: Number(a[iPlayer]),
      equal: Number(a[iEqual]),
      more: Number(a[iMore]),
      minimum: Number(a[iMin]),
      mean: Number(a[iMean]),
    });
  }
  return out;
}
// ---------------- UI glue ----------------
const els = {
  raw: document.getElementById('raw'),
  file: document.getElementById('file'),
  run: document.getElementById('run'),
  clear: document.getElementById('clear'),
  sample: document.getElementById('loadSample'),
  table: document.getElementById('table'),
  // config
  w_solved: document.getElementById('w_solved'),
  w_mean: document.getElementById('w_mean'),
  w_percentile: document.getElementById('w_percentile'),
  w_best: document.getElementById('w_best'),
  gamma: document.getElementById('gamma'),
  cap_sns: document.getElementById('cap_sns'),
  floor_um: document.getElementById('floor_um'),
  floor_solved: document.getElementById('floor_solved'),
  clip_low: document.getElementById('clip_low'),
  clip_high: document.getElementById('clip_high'),
  rating_scale: document.getElementById('rating_scale'),
  rating_mid: document.getElementById('rating_mid'),
  alpha: document.getElementById('alpha'),
  start: document.getElementById('start'),
  windowN: document.getElementById('windowN'),
  chart1: document.getElementById('chart1'),
  chart2: document.getElementById('chart2')
};
function getCfg(){
  return {
    w_solved: +els.w_solved.value,
    w_mean: +els.w_mean.value,
    w_percentile: +els.w_percentile.value,
    w_best: +els.w_best.value,
    gamma: +els.gamma.value,
    cap_solvable_not_solved: +els.cap_sns.value,
    floor_under_min: +els.floor_um.value,
    floor_solved: +els.floor_solved.value,
    clip_low: +els.clip_low.value,
    clip_high: +els.clip_high.value,
    rating_scale: +els.rating_scale.value,
    rating_mid: +els.rating_mid.value,
    alpha_ewma: +els.alpha.value,
    start_ewma: +els.start.value,
    window_N: Math.max(1, Math.round(+els.windowN.value||20)),
  };
}
// simple tiny canvas line chart (no deps)
function drawChart(canvas, xs, ys, opts={}){
  const ctx = canvas.getContext('2d');
  const W = canvas.width = canvas.clientWidth * (window.devicePixelRatio||1);
  const H = canvas.height = canvas.clientHeight * (window.devicePixelRatio||1);
  ctx.clearRect(0,0,W,H);
  const pad = 28;
  const n = xs.length;
  if (!n){ ctx.fillStyle="#748"; ctx.fillText("Keine Daten", 10, 20); return; }
  const ymin = Math.min(...ys), ymax = Math.max(...ys);
  const xmap = i => pad + (W-2*pad) * (i/(n-1||1));
  const ymap = v => H-pad - (H-2*pad) * ((v - ymin) / (ymax - ymin || 1));
  // axes
  ctx.strokeStyle="#2b3753"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(pad, pad); ctx.lineTo(pad, H-pad); ctx.lineTo(W-pad, H-pad); ctx.stroke();
  // line
  ctx.strokeStyle = opts.color || "#6aa9ff"; ctx.lineWidth = 2 * (window.devicePixelRatio||1);
  ctx.beginPath();
  ys.forEach((v,i)=> { const x=xmap(i), y=ymap(v); i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
  ctx.stroke();
  // title
  ctx.fillStyle="#9aa4b2"; ctx.font= (12*(window.devicePixelRatio||1))+"px system-ui";
  ctx.fillText(opts.title||"", pad, pad-6);
}
function renderTable(rows){
  const fmt = (v, d=2) => (v==null||Number.isNaN(v)) ? "" : (typeof v==="number" ? v.toFixed(d) : v);
  const head = `
    <table><thead><tr>
      <th>datetime</th><th>player</th><th>p (V)</th><th>U</th><th>T</th><th>W</th>
      <th>C_raw</th><th>C_gated</th><th>C_clip</th>
      <th>GameRating</th><th>EWMA</th><th>RollingN</th>
    </tr></thead><tbody>`;
  const body = rows.map(r => `
    <tr>
      <td>${r.datetime}</td>
      <td>${fmt(r.player,0)}</td>
      <td>${fmt(r.Percentile_p,3)}</td>
      <td>${fmt(r.BetterThanMean,0)}</td>
      <td>${r.SolvedGivenSolvable==null?"":fmt(r.SolvedGivenSolvable,0)}</td>
      <td>${fmt(r.BestResult,0)}</td>
      <td>${fmt(r.C_raw,3)}</td>
      <td>${fmt(r.C_gated,3)}</td>
      <td>${fmt(r.C_clipped,3)}</td>
      <td>${fmt(r.GameRating,1)}</td>
      <td>${fmt(r.EWMA_Rating,1)}</td>
      <td>${fmt(r.RollingN_Rating,1)}</td>
    </tr>`).join("");
  els.table.innerHTML = head + body + "</tbody></table>";
}
function runAll(text){
  const rows = parseCSV(text);
  if (!rows.length){ alert("Keine (gültigen) Daten erkannt."); return; }
  const cfg = getCfg();
  const out = computeRatings(rows, cfg);
  renderTable(out);
  const xs = out.map(r=>r.datetime);
  drawChart(els.chart1, xs, out.map(r=>r.GameRating), {title:"GameRating"});
  drawChart(els.chart2, xs, out.map(r=>r.EWMA_Rating), {title:"EWMA (glatt) – RollingN per Tabelle sichtbar"});
}

// Events
els.run.addEventListener('click', ()=> runAll(els.raw.value));
els.clear.addEventListener('click', ()=> { els.raw.value=""; els.table.innerHTML=""; drawChart(els.chart1,[],[]); drawChart(els.chart2,[],[]); });
els.file.addEventListener('change', async (e)=>{
  const f = e.target.files?.[0]; if (!f) return;
  const text = await f.text(); els.raw.value = text;
});
els.sample.addEventListener('click', ()=>{
  els.raw.value = `datetime\talpha\tplayer\tresult\tless\tequal\tmore\tminimum\tmedian\tmean\tmaximum\tmode\tscores\ttrials\tnAuto\tnMoves\tsorter\t$
24.08.2025_12:59:03\t0.99\t76\t16.7\t14.6\t68.7\t13\t33\t34.635\t56\t37\t38\t1000\t25\t64\t2025082412:59:03\t$
24.08.2025_08:48:24\t0.99\t0\t0\t5.2\t94.8\t0\t8\t10.467\t52\t8\t32\t1000\t50\t95\t2025082408:48:24\t$
23.08.2025_22:41:29\t0.99\t0\t100\t0\t0\t100\t2\t20\t18.839\t53\t30\t39\t1000\t73\t163\t2025082322:41:29\t$
23.08.2025_10:54:11\t0.99\t29\t92.9\t6.7\t0.8\t92.5\t10\t51\t47.093\t63\t58\t50\t1000\t23\t67\t2025082310:54:11\t$`;
});

// initial empty charts
drawChart(els.chart1,[],[],{title:"GameRating"});
drawChart(els.chart2,[],[],{title:"EWMA"});
</script>
</body>
</html>
